<script>
const QUESTOES = [
  {num:1, exame:"XLVI Exame — 2026", titulo:"LOA e Investimentos Plurianuais — Constitucionalidade da Inserção", enunciado:"Em determinado ano, na elaboração do projeto de Lei Orçamentária Anual (LOA) da União, o Poder Executivo resolveu inserir as previsões de despesas para os exercícios seguintes, com a especificação dos investimentos plurianuais e daqueles em andamento.", comando:"Sobre esse projeto de LOA, à luz das regras constitucionais de elaboração das leis orçamentárias, assinale a afirmativa correta.", gabarito:"C", alt:{"A": "Veiculou indevidamente investimentos plurianuais e aqueles em andamento, os quais somente poderiam constar do Plano Plurianual (PPA).", "B": "Inseriu, equivocadamente, os investimentos plurianuais em seu conteúdo, pois deveriam estar previstos na Lei de Diretrizes Orçamentárias (LDO).", "C": "Adequa-se às disposições constitucionais que permitem tais inserções dos investimentos plurianuais e daqueles em andamento.", "D": "Poderia conter, apenas, os investimentos já em andamento, uma vez que os investimentos plurianuais somente poderiam constar do Plano Plurianual (PPA)."}, fb:{"A": "Incorreta. O PPA trata do planejamento de médio prazo, mas isso não impede que a LOA também contenha informações e demonstrativos sobre investimentos plurianuais e em andamento. As leis orçamentárias não são compartimentos estanques.", "B": "Incorreta. A LDO tem função diferente: orienta a elaboração da LOA, estabelece metas e prioridades e serve de elo entre o PPA e a LOA. Não é ela que impede a LOA de conter informações sobre investimentos plurianuais.", "C": "Correta! A Constituição Federal, ao disciplinar o sistema orçamentário brasileiro, permite que a LOA contenha demonstrativos e especificações relacionados aos investimentos plurianuais e àqueles em andamento. Essas informações são necessárias para garantir a compatibilidade da LOA com o PPA e para permitir o acompanhamento da execução dos programas de investimento de duração continuada.", "D": "Incorreta. A Constituição permite que a LOA contenha tanto os investimentos em andamento QUANTO os plurianuais — não apenas os já iniciados."}, fund:"CF art. 165: sistema de leis orçamentárias integrado (PPA, LDO, LOA). A LOA deve ser compatível com o PPA (art. 166, §3º, I, CF) e pode conter demonstrativos dos investimentos plurianuais e em andamento, garantindo a continuidade dos programas de duração continuada previstos no PPA.", caqui:"As três leis orçamentárias não são silos separados — elas se comunicam. O PPA PLANEJA (metas e objetivos de médio prazo, incluindo investimentos plurianuais). A LDO ORIENTA (metas fiscais, prioridades, elo entre PPA e LOA). A LOA AUTORIZA (arrecadação e gasto para o exercício, mas pode e deve trazer demonstrativos dos investimentos plurianuais e em andamento para garantir continuidade e transparência). A FGV tenta fazer o candidato pensar que 'plurianual = só PPA'. Errado — a LOA pode e deve demonstrar como os investimentos plurianuais serão executados naquele exercício."},
  {num:2, exame:"XLVI Exame — 2026", titulo:"LRF — Vedação de Operação de Crédito para Pagamento de Pessoal", enunciado:"O Município Alfa estava enfrentando dificuldades para pagar em dia a remuneração de seus servidores públicos municipais. Em razão disso, resolveu requerer à instituição financeira federal BNDES um empréstimo, a fim de pagar as remunerações em atraso. O Município ofereceu, em garantia do empréstimo, terrenos de sua propriedade, cujo valor de mercado inclusive suplantava o montante a ser emprestado.", comando:"Diante desse cenário, assinale a afirmativa correta.", gabarito:"A", alt:{"A": "É proibido ao BNDES realizar empréstimo para o pagamento de despesas com pessoal.", "B": "Como houve oferta de garantia em valor superior ao do empréstimo, este deverá ser realizado pelo BNDES.", "C": "É facultado ao BNDES realizar o empréstimo, mas apenas se reputar que as garantias oferecidas são de liquidez satisfatória.", "D": "Somente uma instituição financeira controlada pelo Estado em que se localiza o Município Alfa poderia realizar tal empréstimo."}, fb:{"A": "Correta! Art. 35, LC 101/2000 (LRF): é vedada a realização de operação de crédito entre um ente da Federação e instituição financeira estatal, inclusive a que se destine ao financiamento de despesas com pessoal ativo, inativo e pensionistas. O empréstimo para pagar salários atrasados é exatamente uma operação de crédito destinada ao pagamento de despesas com pessoal — vedada pela LRF, independentemente do valor ou qualidade das garantias oferecidas.", "B": "Incorreta. A suficiência da garantia é irrelevante. O problema não está na garantia — está na FINALIDADE do empréstimo (pagar pessoal), que é expressamente vedada pela LRF.", "C": "Incorreta. Não existe discricionariedade do BNDES aqui. A operação é simplesmente PROIBIDA pela LRF, independentemente de qualquer avaliação de liquidez das garantias.", "D": "Incorreta. A vedação não depende de qual instituição financeira concede o empréstimo. A proibição recai sobre a FINALIDADE (pagar despesas com pessoal) quando a operação envolve instituição financeira estatal."}, fund:"Art. 35, LC 101/2000 (LRF): é vedada a realização de operação de crédito entre um ente da Federação e instituição financeira estatal, inclusive para financiar despesas com pessoal ativo, inativo e pensionistas. Art. 44, LRF: vedada também a operação de crédito para pagamento de despesas correntes, salvo autorização específica em lei orçamentária.", caqui:"LRF art. 35: proibição clara — operação de crédito com instituição financeira estatal para pagar PESSOAL é vedada. Não importa: o tamanho da garantia, quem é a instituição, se é banco federal ou estadual, se as terras valem mais do que o empréstimo. A vedação é absoluta: empréstimo + finalidade pessoal = proibido. A lógica é impedir que bancos públicos virem 'caixa de emergência' para governos pagarem folha — o que seria fiscalmente irresponsável."},
  {num:3, exame:"XLV Exame — 2025", titulo:"Contingenciamento (LRF) — Despesas Que Podem e Não Podem Ser Limitadas", enunciado:"O Estado Alfa, ao final do segundo bimestre de um determinado exercício financeiro, percebeu que a realização da receita poderia não comportar o cumprimento das metas de resultado primário estabelecidas no Anexo de Metas Fiscais. Em razão disso, o Poder Executivo teve de realizar, nos trinta dias subsequentes, limitação de empenho e movimentação financeira.", comando:"Diante desse cenário, assinale a opção que apresenta, corretamente, a despesa que poderia ser objeto de tal limitação de empenho.", gabarito:"D", alt:{"A": "A despesa que constitua obrigação legal do ente estadual.", "B": "A despesa com o pagamento do serviço da dívida estadual.", "C": "A despesa com desenvolvimento científico custeada por fundo criado para tal finalidade.", "D": "A despesa com aquisição de material de consumo para setores administrativos do Poder Executivo."}, fb:{"A": "Incorreta. Art. 9º, §2º, LRF: não serão objeto de limitação as despesas que constituam obrigações constitucionais ou legais do ente. Despesa imposta por lei não pode ser contingenciada.", "B": "Incorreta. Art. 9º, §2º, LRF: o serviço da dívida também está expressamente excluído da limitação de empenho. A LRF protege o cumprimento das obrigações financeiras para preservar a credibilidade fiscal do ente.", "C": "Incorreta. Despesas com desenvolvimento científico custeadas por fundos específicos possuem proteção constitucional (art. 218, CF) e são ressalvadas da limitação de empenho, desde que os recursos sejam provenientes de fundos criados para essa finalidade.", "D": "Correta! Aquisição de material de consumo administrativo é despesa DISCRICIONÁRIA — pode ser postergada ou reduzida sem violar obrigação legal ou constitucional. É exatamente esse tipo de despesa que o contingenciamento (art. 9º, LRF) visa atingir para equilibrar as contas públicas sem comprometer obrigações essenciais."}, fund:"Art. 9º, LC 101/2000 (LRF): se verificado, ao final de um bimestre, risco de não cumprimento das metas fiscais, os Poderes limitarão os empenhos e movimentação financeira nos 30 dias subsequentes. §2º: exceções — despesas que constituam obrigações constitucionais ou legais, serviço da dívida e despesas ressalvadas na LDO.", caqui:"Contingenciamento = limitar o que é DISCRICIONÁRIO, preservar o que é OBRIGATÓRIO. O que NÃO pode ser contingenciado: obrigação legal/constitucional, serviço da dívida, recursos de fundos específicos (como fundos de ciência e tecnologia). O que PODE ser contingenciado: material de consumo, viagens, eventos, pequenos investimentos não protegidos, despesas de custeio não essenciais. Mnemônico: 'Corta o supérfluo, respeita o obrigatório'."},
  {num:4, exame:"XLV Exame — 2025", titulo:"Execução da Despesa Pública — Empenho, Liquidação e Pagamento (Lei 4.320/64)", enunciado:"Apesar de todas as despesas realizadas no primeiro semestre do ano pela Secretaria de Obras do Estado Alfa estarem devidamente previstas na sua lei orçamentária anual, o procedimento formal para sua realização não vinha atendendo integralmente as etapas e regras da legislação vigente, uma vez que todos os pagamentos aos fornecedores e empreiteiros estavam sendo realizados de maneira direta e antecipada ao vencedor da licitação, logo após a conclusão do edital de licitação.", comando:"Diante desse cenário, à luz da Lei nº 4.320/1964, assinale a afirmativa correta.", gabarito:"A", alt:{"A": "Inicialmente deve ser feito o empenho da despesa contratada e, em seguida, salvo casos especiais previstos em legislação específica, a emissão da nota de empenho; após a verificação da entrega do material e da conclusão integral da obra deve haver a liquidação; por último, será emitida a ordem de pagamento para a empresa credora.", "B": "Após a entrega do material e a conclusão da obra certificada pelo servidor público responsável, será emitida a ordem de pagamento, a qual será utilizada pelo credor para sacar o valor devido na instituição bancária oficial, não sendo nos dias de hoje mais necessário o empenho e a liquidação.", "C": "Tendo havido licitação regular para a contratação de uma empresa para a realização de obras, sendo esta de notória reputação, ficam dispensados empenho e a liquidação, bastando que seja assinado o contrato da obra e apresentada a planilha de custos para que o pagamento seja feito antecipadamente, ficando a contratada responsável pela imediata devolução caso a obra não seja concluída.", "D": "Após a realização da licitação regular e contratação formal, mas antes do início da obra, deverá ser obtida autorização prévia do Tribunal de Contas para que este órgão fiscalizador realize o empenho e emita a nota de empenho; em seguida, o órgão contratante deverá acompanhar a entrega do material e a realização da obra, ficando a cargo deste apenas a liquidação e emissão da ordem de pagamento."}, fb:{"A": "Correta! Arts. 58-65, Lei 4.320/64: a execução da despesa pública segue três fases obrigatórias e sequenciais: (1) EMPENHO = reserva da dotação orçamentária, com emissão da nota de empenho; (2) LIQUIDAÇÃO = verificação do direito do credor (entrega do material, conclusão da obra, prestação do serviço); (3) PAGAMENTO = ordem de pagamento + quitação. O pagamento antes da liquidação viola a Lei 4.320/64.", "B": "Incorreta. O empenho e a liquidação continuam sendo obrigatórios. A Lei 4.320/64 não foi revogada nessa parte. Não basta a certificação do servidor — é preciso seguir a sequência legal.", "C": "Incorreta. A licitação regular e a reputação da empresa NÃO dispensam empenho nem liquidação. Além disso, pagamento antecipado antes da conclusão da obra viola a ordem legal das fases da despesa.", "D": "Incorreta. O Tribunal de Contas NÃO realiza empenho nem emite nota de empenho. O TC exerce controle externo — não pratica atos de gestão da despesa. O empenho é ato da Administração Pública, não do TC."}, fund:"Arts. 58-65, Lei 4.320/64: (i) Empenho (art. 58): ato que reserva dotação orçamentária e cria para o Estado obrigação de pagamento; (ii) Liquidação (art. 63): verificação do direito do credor baseada em documentos comprobatórios do cumprimento da obrigação; (iii) Pagamento (art. 64): após a liquidação, emite-se a ordem de pagamento.", caqui:"As três fases da despesa pública — decore como E-L-P: EMPENHO (reserva a dotação, emite nota de empenho) → LIQUIDAÇÃO (verifica que a obra foi feita / material entregue / serviço prestado) → PAGAMENTO (ordem de pagamento + quitação). Nunca ao contrário. Pagamento antes da liquidação = ilegal. TC não faz empenho — TC fiscaliza, não administra. Licitação regular não dispensa as fases — só escolhe o contratado, as fases de execução da despesa continuam obrigatórias."},
  {num:5, exame:"XLIV Exame — 2025", titulo:"Princípio da Exclusividade da LOA — Exceções Constitucionais", enunciado:"Em um determinado exercício financeiro, o Projeto de Lei Orçamentária Anual (PLOA) enviado pelo Governador do Estado Alfa à Assembleia Legislativa dispunha sobre matérias relacionadas ao direito financeiro, entre as quais: I. autorização para abertura de créditos adicionais suplementares; II. autorização para abertura de créditos adicionais especiais; III. autorização para contratação de operações de crédito; IV. autorização para contratação de operações de crédito por antecipação de receita.", comando:"Diante desse cenário, à luz do texto da Constituição Federal de 1988, assinale a afirmativa correta.", gabarito:"B", alt:{"A": "A autorização para abertura de créditos adicionais suplementares não poderia constar neste PLOA.", "B": "A autorização para abertura de créditos adicionais especiais foi indevidamente inserida neste PLOA.", "C": "A autorização para contratação de operações de crédito não poderia ser prevista neste PLOA.", "D": "A Constituição Federal expressamente proíbe que se insira no PLOA autorização para contratação de operações de crédito por antecipação de receita."}, fb:{"A": "Incorreta. Créditos suplementares SÃO uma das exceções expressas ao princípio da exclusividade (art. 165, §8º, CF). Portanto, podem — e costumam — constar da LOA.", "B": "Correta! Art. 165, §8º, CF: o princípio da exclusividade admite apenas duas exceções na LOA: (1) autorização para créditos SUPLEMENTARES e (2) autorização para operações de crédito, inclusive ARO. Créditos ESPECIAIS não estão entre as exceções. Eles são abertos por lei específica, não pela LOA.", "C": "Incorreta. Operações de crédito são expressamente PERMITIDAS na LOA pelo art. 165, §8º, CF — é uma das duas exceções ao princípio da exclusividade.", "D": "Incorreta. A Constituição NÃO proíbe — ao contrário, PERMITE expressamente a autorização para operações de crédito por antecipação de receita (ARO) na LOA. O art. 165, §8º, CF menciona 'operações de crédito, ainda que por antecipação de receita'."}, fund:"Art. 165, §8º, CF: princípio da exclusividade da LOA — a LOA não conterá dispositivo estranho à previsão da receita e fixação da despesa, NÃO se incluindo na proibição: (a) autorização para abertura de créditos suplementares e (b) contratação de operações de crédito, ainda que por antecipação de receita, nos termos da lei.", caqui:"Exclusividade da LOA: a LOA é monodisciplinar — só trata de receita e despesa. Duas exceções (e só duas): S de SUPLEMENTARES e O de OPERAÇÕES DE CRÉDITO (incluindo ARO). Mnemônico: 'SO' — 'Só o SO pode entrar'. Créditos ESPECIAIS ficam de fora — precisam de lei própria. Créditos EXTRAORDINÁRIOS também ficam de fora — abertos por MP em caso de urgência e imprevisibilidade. A FGV adora colocar 'especiais' para confundir com 'suplementares'."},
  {num:6, exame:"XLIII Exame — 2025", titulo:"Composição da LOA — Três Orçamentos em Uma Única Lei", enunciado:"O projeto da Lei Orçamentária Anual (LOA) de determinado ente federativo, encaminhado ao Poder Legislativo pelo Poder Executivo, prevê apenas o orçamento fiscal do referido ente. Na mensagem de encaminhamento do projeto de LOA, está esclarecido que o orçamento de investimentos das empresas em que o ente, direta ou indiretamente, detenha a maioria do capital social com direito a voto, bem como o orçamento da seguridade social do ente, será encaminhado individualmente por meio de outros projetos.", comando:"Diante desse cenário, sobre esse procedimento assinale a afirmativa correta.", gabarito:"B", alt:{"A": "Viola a regra constitucional de que o orçamento da seguridade social deve integrar a Lei de Diretrizes Orçamentárias.", "B": "Não atende à regra constitucional de que a LOA compreenderá também o orçamento de investimentos e o orçamento da seguridade social.", "C": "Está correto, pois apenas o orçamento fiscal compõe a LOA, devendo o orçamento de investimento e o orçamento da seguridade social serem previstos em leis próprias para cada um desses tipos de orçamentos.", "D": "É inadequado em relação ao orçamento de investimentos, que deveria compor a LOA, mas é admitido em relação ao orçamento da seguridade social, que pode ser previsto em outra lei, desde que seu valor global esteja previsto na LOA."}, fb:{"A": "Incorreta. O orçamento da seguridade social integra a LOA (não a LDO). A LDO tem função diferente: orientar a elaboração da LOA, estabelecer metas e prioridades, disciplinar o equilíbrio entre receitas e despesas.", "B": "Correta! Art. 165, §5º, CF: a LOA compreenderá: I — o orçamento fiscal; II — o orçamento de investimento das empresas em que o ente detenha maioria do capital social com direito a voto; III — o orçamento da seguridade social. São três orçamentos em UMA única LOA. Não podem ser encaminhados em leis separadas.", "C": "Incorreta. Os três orçamentos compõem a mesma LOA — não podem ser divididos em leis autônomas. A Constituição é expressa.", "D": "Incorreta. Tanto o orçamento de investimentos QUANTO o orçamento da seguridade social devem integrar a LOA. Nenhum pode ser previsto em lei separada."}, fund:"Art. 165, §5º, CF: a LOA compreenderá: I — orçamento fiscal referente aos Poderes da União, seus fundos, órgãos e entidades da administração direta e indireta; II — orçamento de investimento das empresas em que a União, direta ou indiretamente, detenha a maioria do capital social com direito a voto; III — orçamento da seguridade social.", caqui:"LOA = 3 orçamentos em 1. Mnemônico: FIS-INV-SEG. FISCal (Poderes, órgãos, entidades). INVestimento das estatais (onde o ente tem maioria do capital votante). SEGuridade Social (previdência, assistência, saúde). Não podem ser enviados em leis separadas — a CF exige os três na mesma LOA. A FGV tenta confundir o candidato sugerindo que seguridade social vai para a LDO (errado) ou que os orçamentos podem ser autônomos (errado)."},
  {num:7, exame:"XLIII Exame — 2025", titulo:"LRF — Sanções por Excesso de Despesa com Pessoal Não Corrigido", enunciado:"O Estado Beta, no último ano, ultrapassou o limite de despesa total de pessoal (60% da RCL). Por falta de gestão responsável, o Poder Executivo Estadual ainda não conseguiu alcançar a redução determinada pela própria LRF, dentro do prazo por ela estipulado, para atender ao percentual máximo de 49% da RCL, fixado como limite individual de despesas com pessoal para o Poder Executivo Estadual.", comando:"Diante desse cenário, à luz da Lei de Responsabilidade Fiscal, o Poder Executivo estadual não poderá", gabarito:"D", alt:{"A": "realizar qualquer operação de crédito, apenas.", "B": "receber transferências voluntárias (exceto nas áreas de educação, saúde e assistência social), mas poderá obter garantia de outro ente, bem como poderá contratar operações de crédito.", "C": "obter garantia de outro ente, nem contratar operações de crédito, ressalvadas as que visem à redução das despesas com pessoal, mas poderá receber transferências voluntárias em quaisquer áreas.", "D": "receber transferências voluntárias (exceto nas áreas de educação, saúde e assistência social), nem obter garantia de outro ente, nem contratar operações de crédito, ressalvadas as destinadas ao pagamento da dívida mobiliária e as que visem à redução das despesas com pessoal."}, fb:{"A": "Incorreta. As sanções vão além das operações de crédito — também incluem vedação a transferências voluntárias e a garantias. A alternativa é incompleta.", "B": "Incorreta. Não pode obter garantia de outro ente nem contratar operações de crédito (salvo exceções). A alternativa erra ao afirmar que poderia obter garantia e contratar operações de crédito livremente.", "C": "Incorreta. Poderá receber transferências voluntárias, mas apenas nas áreas de educação, saúde e assistência social — não em quaisquer áreas.", "D": "Correta! Art. 23, §3º, LRF: não obtida a redução no prazo, o ente ficará impedido de: (I) receber transferências voluntárias — ressalvadas educação, saúde e assistência social; (II) obter garantia, direta ou indireta, de outro ente; (III) contratar operações de crédito — ressalvadas as destinadas ao refinanciamento da dívida mobiliária e as que visem à redução das despesas com pessoal."}, fund:"Art. 23, §3º, LC 101/2000 (LRF): sanções pelo não cumprimento da redução da despesa com pessoal no prazo: (I) vedação a transferências voluntárias (exceto EAS: educação, assistência e saúde); (II) vedação a obter garantia de outro ente; (III) vedação a contratar operações de crédito (exceto refinanciamento da dívida mobiliária e redução da despesa com pessoal).", caqui:"Sanções do art. 23 LRF — mnemônico TGO: T = Transferências voluntárias vedadas (exceto: Educação, Assistência social e Saúde — EAS). G = Garantia de outro ente vedada. O = Operações de crédito vedadas (exceto: refinanciamento dívida mobiliária + redução de pessoal). A questão exige a resposta COMPLETA com todas as três sanções e com as exceções corretas. A FGV adora omitir uma das exceções ou uma das sanções para confundir."},
  {num:8, exame:"XLI Exame — 2024", titulo:"PLDO — Tramitação pela Comissão Mista de Orçamentos (CMO)", enunciado:"O Presidente da República deve enviar, todo ano, o Projeto da Lei de Diretrizes Orçamentárias (PLDO) da União ao Congresso Nacional para ser apreciado e votado. Como projeto de lei orçamentária que é, possui especificidades em seu regime de tramitação.", comando:"A CRFB/88 estabelece que o PLDO, ao chegar ao Poder Legislativo, deve ser encaminhado ao(à)", gabarito:"C", alt:{"A": "Plenário do Congresso Nacional, para apreciação e votação única do PLDO em sessão conjunta de ambas as Casas.", "B": "Plenário da Câmara dos Deputados, para apreciação e votação em turno único, e posterior remessa ao Plenário do Senado Federal para votação do PLDO.", "C": "Comissão Mista de Planos, Orçamentos Públicos e Fiscalização – CMO, para examinar e emitir parecer sobre o PLDO.", "D": "Comissão de Constituição e Justiça e de Cidadania – CCJ, para examinar e emitir parecer sobre o PLDO."}, fb:{"A": "Incorreta. O projeto não vai diretamente ao Plenário. Antes, passa obrigatoriamente pela CMO, que examinará e emitirá parecer.", "B": "Incorreta. As leis orçamentárias não seguem o procedimento legislativo ordinário (Câmara → Senado). Elas têm rito próprio com sessão conjunta do Congresso e passagem prévia pela CMO.", "C": "Correta! Art. 166, §1º, CF: caberá a uma comissão mista permanente de Senadores e Deputados examinar e emitir parecer sobre os projetos referidos no art. 166 (PPA, LDO, LOA e créditos adicionais). Essa comissão é a CMO — Comissão Mista de Planos, Orçamentos Públicos e Fiscalização.", "D": "Incorreta. A CCJ examina constitucionalidade de projetos de lei em geral, mas não é o órgão constitucionalmente incumbido de analisar os projetos de leis orçamentárias. Para isso existe a CMO."}, fund:"Art. 166, §1º, CF: comissão mista permanente de Senadores e Deputados examinará e emitirá parecer sobre o PPA, LDO, LOA e créditos adicionais. Art. 166, caput: os projetos orçamentários serão apreciados pelas duas Casas do Congresso Nacional na forma do regimento comum (sessão conjunta).", caqui:"Rito especial das leis orçamentárias: não seguem o caminho ordinário Câmara → Senado. Passam pela CMO (Comissão Mista de Planos, Orçamentos Públicos e Fiscalização) — comissão permanente formada por Senadores e Deputados — que examina e emite parecer. Depois são votadas em SESSÃO CONJUNTA (ambas as casas reunidas). Não confundir CMO com CCJ: a CCJ cuida de constitucionalidade geral; a CMO cuida especificamente das leis orçamentárias. Toda lei orçamentária (PPA, LDO, LOA, créditos adicionais) passa pela CMO."},
  {num:9, exame:"XLI Exame — 2024", titulo:"PPA, LDO e LOA — Vigência, Elaboração e Primeiro Ano de Mandato", enunciado:"O prefeito do Município Alfa, em determinado exercício financeiro, na primeira semana do seu mandato, convocou todos os seus secretários, assessores e consultores para definir a política financeira da sua gestão. Na reunião, ele questionou alguns aspectos do orçamento público municipal.", comando:"Diante desse cenário, considerando que a Lei Orgânica Municipal reproduz as mesmas normas do Direito Financeiro da Constituição Federal de 1988, inclusive quanto aos prazos, assinale a opção que indica a informação que você, na qualidade de consultor(a) jurídico(o), corretamente prestou.", gabarito:"A", alt:{"A": "Ele deverá usar, no primeiro ano do mandato, a Lei Orçamentária Anual (LOA), cuja proposta foi elaborada pelo prefeito antecessor e por este encaminhada à Câmara de Vereadores que a aprovou.", "B": "Ele deverá editar, antes do fim do primeiro biênio de seu mandato, um decreto contendo o Plano Plurianual (PPA), que vigerá ao longo dos quatro anos subsequentes, cujo conteúdo orienta e vincula a elaboração da Lei Orçamentária Anual (LOA) e da Lei de Diretrizes Orçamentárias (LDO).", "C": "Ele terá que encaminhar para a Câmara de Vereadores, até 31 de outubro do mesmo ano, o projeto da Lei Orçamentária Anual (LOA) para o exercício financeiro seguinte.", "D": "Ele deverá adotar a Lei de Diretrizes Orçamentárias (LDO), que vigerá por quatro anos, a fim de acompanhar a vigência do Plano Plurianual (PPA)."}, fb:{"A": "Correta! No primeiro ano de mandato, o novo prefeito executa a LOA elaborada pelo antecessor — essa é a lógica do sistema orçamentário brasileiro, que garante continuidade da administração pública. O chefe do Executivo anterior prepara o orçamento do ano inicial do novo mandato; o novo prefeito o executa.", "B": "Incorreta. Dois erros: (1) o PPA é instituído por LEI, não por decreto; (2) vige do 2º ano do mandato atual ao 1º ano do mandato seguinte (4 anos), mas não são 'os quatro anos subsequentes' ao decreto — começa no 2º ano. Além disso, o PPA não 'vincula' a LOA de forma absoluta — a LOA deve ser compatível, mas a CF não usa o termo 'vincula'.", "C": "Incorreta. O prazo de 31 de outubro não consta da Constituição Federal para envio da LOA. A CF fixa, no ADCT (art. 35), prazos apenas para a União. Para municípios, a LOM define os prazos — e a questão informa que a LOM reproduz a CF, que não prevê 31 de outubro para LOA.", "D": "Incorreta. A LDO tem vigência ANUAL, não quadrienal. Quem tem vigência quadrienal é o PPA."}, fund:"CF art. 165: iniciativa das leis orçamentárias é privativa do Executivo. PPA: vigência do 2º ano do mandato atual ao 1º ano do mandato seguinte. LDO: vigência anual, orienta elaboração da LOA. LOA: vigência anual; no 1º ano do novo mandato, executa-se a LOA aprovada na gestão anterior.", caqui:"Cronograma orçamentário do novo gestor: Ano 1 = executa LOA do antecessor + elabora seu PPA. Ano 2 = começa a viger seu PPA + elabora LDO e LOA sob sua gestão. PPA vige 4 anos (do 2º ao 5º do ciclo). LDO e LOA = anuais. PPA é instituído por LEI (não decreto). No primeiro mandato, é natural e obrigatório executar o orçamento herdado — por isso o gestor anterior tem obrigação de enviar a LOA antes de deixar o cargo."},
  {num:10, exame:"XL Exame — 2024", titulo:"Controle Externo e Prestação de Contas por Entidade Privada", enunciado:"A Escolinha do Gol, entidade privada sem fins lucrativos, entre os anos de 2020 a 2022, recebeu diretamente da União a quantia de R$ 100.000,00 para financiar seu programa beneficente de ensino e treinamento de futebol para crianças carentes. Pedro, administrador da instituição, recebeu, em janeiro de 2023, uma notificação do Tribunal de Contas da União (TCU) intimando a instituição a prestar contas dos recursos recebidos no prazo de 30 dias.", comando:"Diante desse cenário, assinale a opção que apresenta sua orientação.", gabarito:"C", alt:{"A": "Por não se tratar de uma entidade pública, e sim de uma instituição privada, não se submete à fiscalização e ao controle de qualquer Tribunal de Contas.", "B": "Não pode o TCU fiscalizar e controlar tais repasses, cabendo apenas ao Tribunal de Contas do Estado Beta, por ser o Município Alfa destinatário e efetivo usuário de tais recursos repassados.", "C": "É devida a prestação de contas de qualquer pessoa física ou jurídica, pública ou privada que receba e utilize dinheiro público.", "D": "Apenas deverão prestar contas dos recursos públicos recebidos aqueles que os aplicarem em atividade diversa da originalmente estabelecida ou que não os tenham aplicado integralmente."}, fb:{"A": "Incorreta. Art. 70, parágrafo único, CF: a obrigação de prestar contas alcança QUALQUER pessoa física ou jurídica, pública ou privada, que utilize, arrecade, guarde, gerencie ou administre recursos públicos. Ser privada não exonera da obrigação.", "B": "Incorreta. Como os recursos foram repassados DIRETAMENTE PELA UNIÃO, a competência para fiscalizar é do TCU (não do TCE). O TCE fiscaliza recursos estaduais. O TCU fiscaliza recursos federais.", "C": "Correta! Art. 70, parágrafo único, CF: prestará contas qualquer pessoa física ou jurídica, pública ou privada, que utilize, arrecade, guarde, gerencie ou administre dinheiros, bens e valores públicos ou pelos quais a União responda. A Escolinha recebeu recursos da União = presta contas ao TCU.", "D": "Incorreta. A obrigação de prestar contas é SEMPRE devida — independentemente de a aplicação ter sido correta ou não. O correto uso dos recursos será demonstrado justamente na prestação de contas. Só prestar contas em caso de desvio seria destruir o controle preventivo."}, fund:"Art. 70, parágrafo único, CF: prestará contas qualquer pessoa física ou jurídica, pública ou privada, que utilize, arrecade, guarde, gerencie ou administre dinheiros, bens e valores públicos ou pelos quais a União responda, ou que, em nome desta, assuma obrigações de natureza pecuniária. TCU: fiscaliza recursos federais, inclusive quando repassados a entidades privadas.", caqui:"Regra absoluta: recebeu dinheiro público = presta contas. Não importa se é: empresa, ONG, fundação, associação, escola, clube, pessoa física. O que importa é a ORIGEM do recurso (público) e o DESTINO (quem administrou). Quem fiscaliza: recursos federais = TCU. Recursos estaduais = TCE. Recursos municipais = TCM ou TCE (conforme o estado). A Escolinha recebeu da União = TCU fiscaliza, não o TCE."},
  {num:11, exame:"XL Exame — 2024", titulo:"Iniciativa da LOA — Competência Privativa do Executivo e Vício de Iniciativa", enunciado:"O Presidente da República se quedou inerte quanto à elaboração e ao envio do projeto de Lei Orçamentária Anual (LOA) da União para aprovação do Congresso Nacional no prazo estabelecido pela CRFB/88. O Presidente do Congresso Nacional, então, assumiu a responsabilidade de elaboração de um novo projeto de LOA e de envio para tramitação e aprovação de ambas as Casas do Congresso Nacional.", comando:"Nesse caso, é correto afirmar que:", gabarito:"A", alt:{"A": "Caso aprovada, a referida LOA será inconstitucional por vício de iniciativa, já que é de competência privativa do Presidente da República sua elaboração e seu envio ao Congresso Nacional, não podendo o Presidente do Congresso Nacional realizar tal elaboração nem mesmo em caráter excepcional.", "B": "Comprovada a inércia do Presidente da República, admite-se, de forma subsidiária, que a iniciativa do referido projeto de LOA seja exercida por pessoa diversa, a exemplo do Presidente do Congresso Nacional.", "C": "Quando o Presidente da República deixa de apresentar o projeto de LOA da União no prazo legal, a CRFB/88 prevê a possibilidade de o Poder Judiciário, o Ministério Público, a Defensoria Pública e o Poder Legislativo apresentarem, autonomamente, seus respectivos projetos de orçamentos para tramitação no Congresso Nacional.", "D": "A referida LOA somente não será inconstitucional, por vício de iniciativa, caso sua aprovação se dê pelo processo legislativo de aprovação de lei complementar, uma vez que, por se tratar de hipótese excepcional, a Constituição Federal de 1988 prevê um maior rigor para sua aprovação."}, fb:{"A": "Correta! Art. 165, CF: as leis orçamentárias (PPA, LDO, LOA) são de iniciativa PRIVATIVA do Chefe do Poder Executivo. A Constituição não prevê substituição dessa iniciativa em caso de omissão. A elaboração pelo Presidente do Congresso Nacional gera VÍCIO FORMAL DE INICIATIVA, tornando a lei aprovada inconstitucional.", "B": "Incorreta. Não existe iniciativa subsidiária para a LOA na Constituição. A omissão do Presidente gera responsabilidade político-jurídica, mas não transfere a competência para outro órgão.", "C": "Incorreta. A Constituição não autoriza que Judiciário, MP, Defensoria ou Legislativo apresentem LOA de forma autônoma. Esses órgãos encaminham suas PROPOSTAS orçamentárias ao Executivo, que consolida o PROJETO e o envia ao Congresso.", "D": "Incorreta. Não existe previsão constitucional de que a LOA seja aprovada por processo legislativo de lei complementar em caso de vício de iniciativa. A LOA é lei ordinária. Não há 'exceção processual' que sane o vício de iniciativa."}, fund:"Art. 165, CF: leis orçamentárias são de iniciativa do Poder Executivo (PPA, LDO e LOA). Vício de iniciativa gera inconstitucionalidade formal. Não há previsão de iniciativa subsidiária. Os demais Poderes, MP e Defensoria encaminham propostas parciais ao Executivo, que elabora o projeto consolidado.", caqui:"Iniciativa das leis orçamentárias = exclusiva do EXECUTIVO. Sempre. Mesmo que o Presidente seja omisso, a competência não migra para o Congresso, para o Judiciário, para o MP ou para a Defensoria. A omissão gera responsabilidade — mas não transfere a chave. Se o Congresso apresentar e aprovar a LOA, haverá VÍCIO FORMAL DE INICIATIVA = inconstitucionalidade. Os demais Poderes e órgãos autônomos encaminham suas PROPOSTAS ao Executivo para que este elabore o projeto único e o envie ao Congresso."},
];
let cur=0,N=QUESTOES.length;
const E=Array(N).fill(null);
function init(){
  const nw=document.getElementById('nw'),ct=document.getElementById('ct');
  QUESTOES.forEach((q,i)=>{
    const b=document.createElement('button');
    b.className='nb'+(i===0?' active':'');b.textContent=i+1;b.onclick=()=>go(i);b.id='n'+i;nw.appendChild(b);
    const d=document.createElement('div');d.className='qc'+(i===0?' vis':'');d.id='c'+i;d.innerHTML=bc(q,i);ct.appendChild(d);
  });upd();us();
}
function bc(q,i){
  const al=Object.entries(q.alt).map(([l,t])=>`<button class="ab" onclick="resp(${i},'${l}',this)" data-l="${l}"><span class="all">${l}</span><span class="alt">${t}</span></button>`).join('');
  return `<div class="qh"><span class="qn">Questão ${q.num}</span>${q.exame?`<span class="qe">${q.exame}</span>`:''}</div><h2 class="qt">${q.titulo}</h2><div class="en">${q.enunciado}</div><p class="co">${q.comando}</p><div class="al" id="a${i}">${al}</div><div class="fb" id="f${i}"></div><div class="fu" id="u${i}"><h4>📖 Fundamento legal</h4>${q.fund}</div><div class="cx" id="x${i}"><h4>🍊 Explicação didática do Professor Caqui</h4>${q.caqui}</div><div class="ca"><div class="bg"><button class="btn az" id="bu${i}" onclick="tF(${i})">Ver fundamento legal</button><button class="btn cq" id="bx${i}" onclick="tX(${i})">Explicação do Prof. Caqui</button><button class="btn" id="br${i}" onclick="rst(${i})">↺ Tentar novamente</button></div><span class="st" id="s${i}"></span></div>`;
}
function resp(i,l,btn){
  if(E[i]!==null)return;E[i]=l;const q=QUESTOES[i];
  document.querySelectorAll(`#a${i} .ab`).forEach(b=>{b.disabled=true;if(b.dataset.l===q.gabarito)b.classList.add('cor');if(b.dataset.l===l&&l!==q.gabarito)b.classList.add('err');});
  const ok=l===q.gabarito,f=document.getElementById('f'+i);
  f.className='fb sh '+(ok?'ac':'er');f.innerHTML=`<strong>${ok?'✓ Correta!':'✗ Incorreta.'}</strong> ${q.fb[l]}`;
  document.getElementById('s'+i).textContent=ok?'Acerto!':'Gabarito: '+q.gabarito;
  document.getElementById('br'+i).className='btn sh';document.getElementById('bu'+i).className='btn az sh';document.getElementById('bx'+i).className='btn cq sh';
  const nb=document.getElementById('n'+i);nb.classList.remove('active');nb.classList.add(ok?'ok':'no');if(i===cur)nb.classList.add('active');us();
}
function tF(i){const b=document.getElementById('u'+i),t=document.getElementById('bu'+i),v=b.classList.contains('sh');b.className=v?'fu':'fu sh';t.textContent=v?'Ver fundamento legal':'Ocultar fundamento';}
function tX(i){const b=document.getElementById('x'+i),t=document.getElementById('bx'+i),v=b.classList.contains('sh');b.className=v?'cx':'cx sh';t.textContent=v?'Explicação do Prof. Caqui':'Ocultar explicação';}
function rst(i){
  E[i]=null;document.querySelectorAll(`#a${i} .ab`).forEach(b=>{b.disabled=false;b.className='ab';});
  document.getElementById('f'+i).className='fb';document.getElementById('u'+i).className='fu';
  document.getElementById('bu'+i).className='btn az';document.getElementById('bu'+i).textContent='Ver fundamento legal';
  document.getElementById('x'+i).className='cx';document.getElementById('bx'+i).className='btn cq';document.getElementById('bx'+i).textContent='Explicação do Prof. Caqui';
  document.getElementById('br'+i).className='btn';document.getElementById('s'+i).textContent='';
  document.getElementById('n'+i).className='nb'+(i===cur?' active':'');us();
}
function go(i){document.getElementById('c'+cur).classList.remove('vis');document.getElementById('n'+cur).classList.remove('active');cur=i;document.getElementById('c'+cur).classList.add('vis');document.getElementById('n'+cur).classList.add('active');upd();window.scrollTo({top:0,behavior:'smooth'});}
function nav(d){const n=cur+d;if(n>=0&&n<N)go(n);}
function upd(){document.getElementById('pi').textContent=(cur+1)+' de '+N;document.getElementById('bp').disabled=cur===0;document.getElementById('bn').disabled=cur===N-1;}
function us(){const r=E.filter(e=>e!==null).length,a=E.filter((e,i)=>e===QUESTOES[i].gabarito).length;document.getElementById('sc-t').textContent=r;document.getElementById('sc-a').textContent=a;document.getElementById('sc-e').textContent=r-a;const p=Math.round((r/N)*100);document.getElementById('pf').style.width=p+'%';document.getElementById('pl').textContent=r+' de '+N+' respondidas';}
init();
